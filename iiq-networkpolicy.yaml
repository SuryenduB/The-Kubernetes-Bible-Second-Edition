apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-iiq-to-backends
  namespace: iiqstack
spec:
  podSelector:
    matchLabels:
      app: iiq
  policyTypes: ["Egress"]
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: db
    ports:
    - protocol: TCP
      port: 1433
  - to:
    - podSelector:
        matchLabels:
          app: ldap
    ports:
    - protocol: TCP
      port: 389
