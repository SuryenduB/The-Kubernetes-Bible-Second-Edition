# 1:1 K3s Port of "iiqstack" - Fully Compatible & Hardened Version
# Features: Dedicated Namespace, PDB, Tailscale Operator, Traefik L7 (Sticky Cookies), NAS Storage (RWX)

---
# --- 0. Namespace ---
apiVersion: v1
kind: Namespace
metadata:
  name: iiqstack

---
# --- SailPoint Secrets ---
apiVersion: v1
kind: Secret
metadata:
  name: sailpoint-db-secrets
  namespace: iiqstack
type: Opaque
stringData:
  mssql-sa-password: "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx"
  mssql-user-password: "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx"
  mysql-root-password: "password"
  mysql-user-password: "identityiq"
  ldap-admin-password: "spadmin"
  ssh-password: "password"

---
# --- 1. Counter Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter
  namespace: iiqstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: counter
  template:
    metadata:
      labels:
        app: counter
    spec:
      containers:
      - name: counter
        image: drosenbauer/docker-counter
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 100m, memory: 128Mi }
        livenessProbe:
          tcpSocket: { port: 12345 }
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: counter
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-counter"
spec:
  selector:
    app: counter
  ports:
  - protocol: TCP
    port: 12345
    targetPort: 12345

---
# --- 2. SSH Host ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh
  namespace: iiqstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh
  template:
    metadata:
      labels:
        app: ssh
    spec:
      containers:
      - name: ssh
        image: drosenbauer/docker-ssh-host
        env:
        - name: SSH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: ssh-password
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 100m, memory: 128Mi }
        livenessProbe:
          tcpSocket: { port: 22 }
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ssh
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-ssh"
spec:
  selector:
    app: ssh
  ports:
  - protocol: TCP
    port: 22
    targetPort: 22

---
# --- 3. LDAP & phpLDAPadmin ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ldap
  namespace: iiqstack
spec:
  replicas: 1
  serviceName: ldap
  selector:
    matchLabels:
      app: ldap
  template:
    metadata:
      labels:
        app: ldap
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 0
        fsGroup: 911
      containers:
      - name: ldap
        image: osixia/openldap:1.5.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 389
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits: { cpu: 500m, memory: 512Mi }
        livenessProbe:
          tcpSocket: { port: 389 }
          initialDelaySeconds: 60
          periodSeconds: 30
        env:
        - name: LDAP_DOMAIN
          value: sailpoint.demo
        - name: LDAP_ORGANISATION
          value: Sailpoint Demo
        - name: LDAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: ldap-admin-password
        - name: LDAP_TLS
          value: "false"
        volumeMounts:
        - name: ldap-persistent-storage
          mountPath: /var/lib/ldap
          subPath: data
        - name: ldap-persistent-storage
          mountPath: /etc/ldap/slapd.d
          subPath: config
  volumeClaimTemplates:
  - metadata:
      name: ldap-persistent-storage
    spec:
      accessModes: [ "ReadWriteMany" ]
      resources:
        requests:
          storage: 2Gi
      storageClassName: nfs-nas
---
apiVersion: v1
kind: Service
metadata:
  name: ldap
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-ldap"
spec:
  selector:
    app: ldap
  ports:
  - name: ldap
    protocol: TCP
    port: 389
    targetPort: 389

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpldapadmin
  namespace: iiqstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpldapadmin
  template:
    metadata:
      labels:
        app: phpldapadmin
    spec:
      containers:
      - name: phpldapadmin
        image: osixia/phpldapadmin
        ports:
        - containerPort: 443
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 100m, memory: 128Mi }
        env:
        - name: PHPLDAPADMIN_LDAP_HOSTS
          value: ldap
---
apiVersion: v1
kind: Service
metadata:
  name: phpldapadmin
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-ldap-admin"
spec:
  type: ClusterIP
  selector:
    app: phpldapadmin
  ports:
  - protocol: TCP
    port: 443
    targetPort: 443

---
# --- 4. ActiveMQ ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: activemq
  namespace: iiqstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activemq
  template:
    metadata:
      labels:
        app: activemq
    spec:
      containers:
      - name: activemq
        image: apache/activemq-artemis:latest-alpine
        ports:
        - containerPort: 8161
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits: { cpu: 300m, memory: 512Mi }
        livenessProbe:
          tcpSocket: { port: 8161 }
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: activemq
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-mq-admin"
spec:
  type: ClusterIP
  selector:
    app: activemq
  ports:
  - protocol: TCP
    port: 8161
    targetPort: 8161
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: activemq-ingress
  namespace: iiqstack
spec:
  entryPoints: [ "web" ]
  routes:
  - match: PathPrefix(`/activemq`)
    kind: Rule
    services:
    - name: activemq
      port: 8161
      sticky:
        cookie: {}

---
# --- 5. Databases ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: iiqstack
spec:
  replicas: 1
  serviceName: db
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 0
        fsGroup: 10001
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2019-latest
        resources:
          requests: { cpu: 500m, memory: 2Gi }
          limits: { cpu: "1.5", memory: 4Gi }
        readinessProbe:
          exec:
            command:
            - /opt/mssql-tools18/bin/sqlcmd
            - -S
            - localhost
            - -U
            - sa
            - -P
            - "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx"
            - -C
            - -Q
            - "SELECT 1"
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          tcpSocket: { port: 1433 }
          initialDelaySeconds: 60
          periodSeconds: 30
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: MSSQL_SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mssql-sa-password
        - name: MSSQL_PID
          value: Developer
        volumeMounts:
        - name: mssql-persistent-storage
          mountPath: /var/opt/mssql
  volumeClaimTemplates:
  - metadata:
      name: mssql-persistent-storage
    spec:
      accessModes: [ "ReadWriteMany" ]
      resources:
        requests:
          storage: 10Gi
      storageClassName: nfs-nas
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-db"
spec:
  selector:
    app: db
  ports:
  - protocol: TCP
    port: 1433
    targetPort: 1433

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-mysql
  namespace: iiqstack
spec:
  replicas: 1
  serviceName: db-mysql
  selector:
    matchLabels:
      app: db-mysql
  template:
    metadata:
      labels:
        app: db-mysql
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 999
      containers:
      - name: mysql
        image: mysql:8.0
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits: { cpu: 500m, memory: 1Gi }
        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          tcpSocket: { port: 3306 }
          initialDelaySeconds: 60
          periodSeconds: 30
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: identityiq
        - name: MYSQL_USER
          value: identityiq
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mysql-user-password
        volumeMounts:
        - name: mysql-persistent-storage
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mysql-persistent-storage
    spec:
      accessModes: [ "ReadWriteMany" ]
      resources:
        requests:
          storage: 10Gi
      storageClassName: nfs-nas
---
apiVersion: v1
kind: Service
metadata:
  name: db-mysql
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-db-mysql"
spec:
  selector:
    app: db-mysql
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306

---
# --- 6. Mailpit ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mail
  namespace: iiqstack
spec:
  replicas: 1
  serviceName: mail
  selector:
    matchLabels:
      app: mail
  template:
    metadata:
      labels:
        app: mail
    spec:
      containers:
      - name: mailpit
        image: axllent/mailpit
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits: { cpu: 200m, memory: 256Mi }
        livenessProbe:
          tcpSocket: { port: 8025 }
          initialDelaySeconds: 15
          periodSeconds: 30
        env:
        - name: MP_MAX_MESSAGES
          value: "5000"
        - name: MP_DATABASE
          value: "/data/mailpit.db"
        - name: MP_SMTP_AUTH_ACCEPT_ANY
          value: "1"
        - name: MP_SMTP_AUTH_ALLOW_INSECURE
          value: "1"
        volumeMounts:
        - name: mail-persistent-storage
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: mail-persistent-storage
    spec:
      accessModes: [ "ReadWriteMany" ]
      resources:
        requests:
          storage: 1Gi
      storageClassName: nfs-nas
---
apiVersion: v1
kind: Service
metadata:
  name: mail
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-mail"
spec:
  type: ClusterIP
  selector:
    app: mail
  ports:
  - name: smtp
    protocol: TCP
    port: 1025
    targetPort: 1025
  - name: http
    protocol: TCP
    port: 8025
    targetPort: 8025

---
# --- 7. IdentityIQ Init Job ---
apiVersion: batch/v1
kind: Job
metadata:
  name: iiq-init
  namespace: iiqstack
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: iiq-init
    spec:
      restartPolicy: Never
      initContainers:
      - name: wait-for-all-dependencies
        image: busybox:1.36
        command: 
        - 'sh'
        - '-c'
        - |
          until nc -z db 1433; do echo waiting for mssql; sleep 5; done;
          until nc -z db-mysql 3306; do echo waiting for mysql; sleep 5; done;
          until nc -z ldap 389; do echo waiting for ldap; sleep 5; done;
          until nc -z mail 1025; do echo waiting for mail; sleep 5; done;
          until nc -z activemq 8161; do echo waiting for activemq; sleep 5; done;
          echo "All dependencies are up."
      containers:
      - name: iiq-init
        image: 192.168.0.236:5000/sailpoint-docker:latest
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits: { cpu: 500m, memory: 1Gi }
        env:
        - name: DATABASE_TYPE
          value: "mssql"
        - name: MSSQL_HOST
          value: db
        - name: MSSQL_SA_USER
          value: sa
        - name: MSSQL_SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mssql-sa-password
        - name: MYSQL_HOST
          value: db-mysql
        - name: MYSQL_USER
          value: identityiq
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mysql-user-password
        - name: MYSQL_DATABASE
          value: identityiq
        - name: INIT
          value: "y"
        - name: LDAP_HOST
          value: ldap
        - name: MAIL_HOST
          value: mail
        - name: ACTIVEMQ_HOST
          value: activemq

---
# --- 8. IdentityIQ App Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iiq
  namespace: iiqstack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      app: iiq
  template:
    metadata:
      labels:
        app: iiq
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
      containers:
      - name: iiq
        image: 192.168.0.236:5000/sailpoint-docker:latest
        ports:
        - containerPort: 8080
        resources:
          requests: { cpu: 500m, memory: 2Gi }
          limits: { cpu: "2", memory: 4Gi }
        startupProbe:
          httpGet: { path: /identityiq, port: 8080 }
          failureThreshold: 60
          periodSeconds: 15
        readinessProbe:
          httpGet: { path: /identityiq, port: 8080 }
          initialDelaySeconds: 30
          periodSeconds: 20
        livenessProbe:
          httpGet: { path: /identityiq, port: 8080 }
          initialDelaySeconds: 600
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        env:
        - name: DATABASE_TYPE
          value: "mssql"
        - name: MSSQL_HOST
          value: db
        - name: MSSQL_SA_USER
          value: sa
        - name: MSSQL_SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mssql-sa-password
        - name: MSSQL_USER
          value: identityiq
        - name: MSSQL_PASS
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mssql-user-password
        - name: MYSQL_HOST
          value: db-mysql
        - name: MYSQL_USER
          value: identityiq
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mysql-user-password
        - name: MYSQL_DATABASE
          value: identityiq
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sailpoint-db-secrets
              key: mysql-root-password
        - name: LDAP_HOST
          value: ldap
        - name: MAIL_HOST
          value: mail
        - name: ACTIVEMQ_HOST
          value: activemq
        - name: CATALINA_OPTS
          value: -Xmx2048M
        volumeMounts:
        - name: iiq-nas-data
          mountPath: /opt/sailpoint/nas-storage
      volumes:
      - name: iiq-nas-data
        persistentVolumeClaim:
          claimName: iiq-nas-pvc

---
# NAS PVC for App Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iiq-nas-pvc
  namespace: iiqstack
spec:
  accessModes: [ "ReadWriteMany" ]
  resources:
    requests:
      storage: 10Gi
  storageClassName: nfs-nas

---
# IdentityIQ PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: iiq-pdb
  namespace: iiqstack
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: iiq

---
# IdentityIQ L7 & Tailscale Services
apiVersion: v1
kind: Service
metadata:
  name: iiq
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "iiq-main"
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  selector:
    app: iiq
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: iiq-ingress
  namespace: iiqstack
spec:
  entryPoints: [ "web" ]
  routes:
  - match: PathPrefix(`/identityiq`)
    kind: Rule
    services:
    - name: iiq
      port: 80
      sticky:
        cookie: {}
