# AudioBookShelf Values - Aligned with Live K3s Deployment
# This configuration matches the actual production deployment using NAS NFS for audiobooks
# and Longhorn for configuration storage

env:
  TZ: "Europe/Berlin"
  METADATA_PATH: "/config/metadata"  # Metadata stored in config PVC
  AUDIOBOOKSHELF_UID: 1000
  AUDIOBOOKSHELF_GID: 1000

service:
  main:
    type: ClusterIP
    ports:
      http:
        port: 80
        targetPort: 80

# Tailscale integration for external access
tailscale:
  enabled: true
  hostname: "audiobookshelf"
  proxyClass: "tailscale-proxy"

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  maxUnavailable: 0

# Resource limits matching live deployment
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Health checks matching live deployment
livenessProbe:
  httpGet:
    path: /healthcheck
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 60

readinessProbe:
  httpGet:
    path: /healthcheck
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 30

# Storage configuration matching live deployment
persistence:
  # Config storage using Longhorn (RWO)
  config:
    enabled: true
    mountPath: /config
    size: 2Gi
    accessMode: ReadWriteOnce
    storageClass: longhorn

  # Audiobooks using NAS NFS (RWX) - Read-only mount
  media:
    enabled: true
    mountPath: /audiobooks
    readOnly: true
    # NFS configuration for NAS
    nfs:
      server: 192.168.0.128
      path: /share/Public/audiobooks
      mountOptions:
        - nfsvers=3
        - nolock
        - noatime
    size: 500Gi  # NAS storage capacity
    accessMode: ReadWriteMany

# Security context matching live deployment
podSecurityContext:
  fsGroup: 1000

# Deployment strategy
strategy:
  type: Recreate
