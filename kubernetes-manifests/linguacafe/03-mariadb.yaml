apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: linguacafe
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.11
        env:
        - name: MARIADB_DATABASE
          valueFrom:
            secretKeyRef:
              name: linguacafe-mariadb-secret
              key: DB_NAME
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: linguacafe-mariadb-secret
              key: DB_USER
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: linguacafe-mariadb-secret
              key: DB_PASSWORD
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: linguacafe-mariadb-secret
              key: DB_PASSWORD
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["mariadb-admin", "ping", "-p$(MARIADB_PASSWORD)"]
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: linguacafe-mariadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: linguacafe
spec:
  ports:
  - port: 3306
    name: mysql
  selector:
    app: mariadb
