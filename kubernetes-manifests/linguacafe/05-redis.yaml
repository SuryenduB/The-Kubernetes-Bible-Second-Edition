apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: linguacafe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--requirepass", "linguacafe"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: linguacafe
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
