apiVersion: v1
kind: Namespace
metadata:
  name: ai-language-learning
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-lang-secrets
  namespace: ai-language-learning
type: Opaque
stringData:
  OPENROUTER_API_KEY: "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"
  OPENAI_BASE_URL: "https://integrate.api.nvidia.com/v1"
  OPENAI_MODEL: "minimaxai/minimax-m3"
  JWT_SECRET: "super_secure_random_jwt_secret_for_homelab_123!"
  DATABASE_URL: "postgres://aiuser:aipassword@ai-postgres:5432/aidb"
  POSTGRES_USER: "aiuser"
  POSTGRES_PASSWORD: "aipassword"
  POSTGRES_DB: "aidb"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-postgres
  namespace: ai-language-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-postgres
  template:
    metadata:
      labels:
        app: ai-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        envFrom:
        - secretRef:
            name: ai-lang-secrets
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pgdata
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-postgres
  namespace: ai-language-learning
spec:
  ports:
  - port: 5432
  selector:
    app: ai-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-lang-backend
  namespace: ai-language-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-lang-backend
  template:
    metadata:
      labels:
        app: ai-lang-backend
    spec:
      initContainers:
      - name: init-db
        image: postgres:15-alpine
        envFrom:
        - secretRef:
            name: ai-lang-secrets
        command:
        - sh
        - -c
        - "until pg_isready -h ai-postgres -U aiuser; do echo waiting for db; sleep 2; done; PGPASSWORD=$POSTGRES_PASSWORD psql -h ai-postgres -U aiuser -d aidb -f /docker-entrypoint-initdb.d/schema.sql"
        volumeMounts:
        - name: schema-sql
          mountPath: /docker-entrypoint-initdb.d
      containers:
      - name: backend
        image: 192.168.0.236:5000/ai-language-learning:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: ai-lang-secrets
        ports:
        - containerPort: 3000
      volumes:
      - name: schema-sql
        configMap:
          name: ai-lang-schema
---
apiVersion: v1
kind: Service
metadata:
  name: ai-lang-backend
  namespace: ai-language-learning
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "lang-tutor"
spec:
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: ai-lang-backend
