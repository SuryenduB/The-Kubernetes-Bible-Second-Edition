apiVersion: v1
kind: Namespace
metadata:
  name: ai-language-learning
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-lang-secrets
  namespace: ai-language-learning
type: Opaque
stringData:
  OPENROUTER_API_KEY: "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"
  OPENAI_BASE_URL: "https://integrate.api.nvidia.com/v1"
  OPENAI_MODEL: "moonshotai/kimi-k2.6"
  JWT_SECRET: "super_secure_random_jwt_secret_for_homelab_123!"
  DATABASE_URL: "postgres://aiuser:aipassword@ai-postgres:5432/aidb"
  POSTGRES_USER: "aiuser"
  POSTGRES_PASSWORD: "aipassword"
  POSTGRES_DB: "aidb"
---
# Database schema, mounted into the init container that bootstraps Postgres
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-lang-schema
  namespace: ai-language-learning
data:
  schema.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id            SERIAL PRIMARY KEY,
      email         TEXT UNIQUE NOT NULL,
      password_hash TEXT        NOT NULL,
      display_name  TEXT,
      created_at    TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS refresh_tokens (
      id         SERIAL PRIMARY KEY,
      user_id    INT  NOT NULL REFERENCES users(id) ON DELETE CASCADE,
      token      TEXT UNIQUE NOT NULL,
      expires_at TIMESTAMPTZ NOT NULL,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_refresh_tokens_user ON refresh_tokens(user_id);

    CREATE TABLE IF NOT EXISTS user_settings (
      user_id           INT PRIMARY KEY REFERENCES users(id) ON DELETE CASCADE,
      theme             TEXT    DEFAULT 'light',
      language          TEXT    DEFAULT 'Spanish',
      difficulty        TEXT    DEFAULT 'Beginner',
      auto_read_enabled BOOLEAN DEFAULT TRUE,
      updated_at        TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS user_storage (
      user_id    INT  NOT NULL REFERENCES users(id) ON DELETE CASCADE,
      key        TEXT NOT NULL,
      value      TEXT NOT NULL,
      updated_at TIMESTAMPTZ DEFAULT NOW(),
      PRIMARY KEY (user_id, key)
    );

    CREATE TABLE IF NOT EXISTS chats (
      id                SERIAL PRIMARY KEY,
      user_id           INT  NOT NULL REFERENCES users(id) ON DELETE CASCADE,
      title             TEXT NOT NULL DEFAULT 'New Chat',
      mode              TEXT NOT NULL DEFAULT 'conversation',
      language          TEXT NOT NULL DEFAULT 'Spanish',
      difficulty        TEXT NOT NULL DEFAULT 'Beginner',
      scenario          TEXT          DEFAULT 'restaurant',
      auto_read_enabled BOOLEAN       DEFAULT TRUE,
      created_at        TIMESTAMPTZ   DEFAULT NOW(),
      updated_at        TIMESTAMPTZ   DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_chats_user ON chats(user_id);

    CREATE TABLE IF NOT EXISTS chat_messages (
      id         SERIAL PRIMARY KEY,
      chat_id    INT  NOT NULL REFERENCES chats(id) ON DELETE CASCADE,
      sender     TEXT NOT NULL,
      text       TEXT,
      html       TEXT,
      created_at TIMESTAMPTZ DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_chat_messages_chat ON chat_messages(chat_id);

    CREATE TABLE IF NOT EXISTS flashcards (
      id           SERIAL PRIMARY KEY,
      user_id      INT  NOT NULL REFERENCES users(id) ON DELETE CASCADE,
      language     TEXT NOT NULL,
      difficulty   TEXT NOT NULL,
      front        TEXT NOT NULL,
      back         TEXT NOT NULL,
      known        BOOLEAN     DEFAULT FALSE,
      review_count INT         DEFAULT 0,
      added_at     TIMESTAMPTZ DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS idx_flashcards_user ON flashcards(user_id);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-postgres
  namespace: ai-language-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-postgres
  template:
    metadata:
      labels:
        app: ai-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        envFrom:
        - secretRef:
            name: ai-lang-secrets
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pgdata
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-postgres
  namespace: ai-language-learning
spec:
  ports:
  - port: 5432
  selector:
    app: ai-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-lang-backend
  namespace: ai-language-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-lang-backend
  template:
    metadata:
      labels:
        app: ai-lang-backend
    spec:
      initContainers:
      - name: init-db
        image: postgres:15-alpine
        envFrom:
        - secretRef:
            name: ai-lang-secrets
        command:
        - sh
        - -c
        - "until pg_isready -h ai-postgres -U aiuser; do echo waiting for db; sleep 2; done; PGPASSWORD=$POSTGRES_PASSWORD psql -h ai-postgres -U aiuser -d aidb -f /docker-entrypoint-initdb.d/schema.sql"
        volumeMounts:
        - name: schema-sql
          mountPath: /docker-entrypoint-initdb.d
      containers:
      - name: backend
        image: 192.168.0.236:5000/ai-language-learning:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: ai-lang-secrets
        ports:
        - containerPort: 3000
      volumes:
      - name: schema-sql
        configMap:
          name: ai-lang-schema
---
apiVersion: v1
kind: Service
metadata:
  name: ai-lang-backend
  namespace: ai-language-learning
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "lang-tutor"
spec:
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: ai-lang-backend
