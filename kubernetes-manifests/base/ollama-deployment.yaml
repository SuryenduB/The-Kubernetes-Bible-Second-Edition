apiVersion: v1
kind: Namespace
metadata:
  name: ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Fix: Add node affinity to ensure consistent placement
      # Ollama requires significant disk space for model cache (~50GB)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - kubernetes6
                - kubernetes5
      containers:
      - name: ollama
        image: ollama/ollama:latest
        imagePullPolicy: IfNotPresent
        # Fix: Increase timeout for large image pull (ollama image ~10GB with model layers)
        ports:
        - name: http
          containerPort: 11434
          protocol: TCP
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"
        livenessProbe:
          httpGet:
            path: /v1/models
            port: 11434
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 11434
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 5
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-pvc
      - name: ollama-storage
        persistentVolumeClaim:
          claimName: ollama-nas-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
  labels:
    app: ollama
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 11434
    targetPort: 11434
    protocol: TCP
  selector:
    app: ollama
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-nas
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-nas-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-nas
  resources:
    requests:
      storage: 2Gi
---
# Open WebUI — chat frontend that talks to Ollama over the internal Service.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: webui-nas-pvc
  namespace: ai
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-nas
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ai
  labels:
    app: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
      - name: openwebui
        image: ghcr.io/open-webui/open-webui
        imagePullPolicy: Always
        env:
        - name: OLLAMA_BASE_URL
          value: "http://ollama:11434"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: webui-storage
          mountPath: /app/data
      volumes:
      - name: webui-storage
        persistentVolumeClaim:
          claimName: webui-nas-pvc
---
# Exposed on the Tailnet via the Tailscale operator (Service annotations).
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: ai
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "openwebui"
spec:
  type: ClusterIP
  selector:
    app: openwebui
  ports:
  - port: 8080
    targetPort: 8080
---
# Local (LAN) ingress for Open WebUI via Traefik.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebui-ingress
  namespace: ai
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: openwebui.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openwebui
            port:
              number: 8080
