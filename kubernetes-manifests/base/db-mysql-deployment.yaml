apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-mysql
spec:
  serviceName: db-mysql
  replicas: 1
  selector:
    matchLabels:
      app: db-mysql
  template:
    metadata:
      labels:
        app: db-mysql
    spec:
      containers:
        - name: mysql
          image: "mysql:8.0"
          env:
            - name: MYSQL_USER
              value: "identityiq"
            - name: MYSQL_PASSWORD
              value: "identityiq"
            - name: MYSQL_DATABASE
              value: "identityiq"
            - name: MYSQL_ROOT_PASSWORD
              value: "password"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-init
          configMap:
            name: mysql-init-script
            defaultMode: 0755

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-nas
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: default
data:
  01-init.sql: |
    -- Create hr database if it doesn't exist
    CREATE DATABASE IF NOT EXISTS hr;
    USE hr;
    
    -- Create hr_people table for IIQ init container validation
    CREATE TABLE IF NOT EXISTS hr_people (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(255) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Insert sample record
    INSERT INTO hr_people (name) VALUES ('System Admin') ON DUPLICATE KEY UPDATE name=VALUES(name);
    
    GRANT ALL PRIVILEGES ON hr.* TO 'identityiq'@'%';
    FLUSH PRIVILEGES;