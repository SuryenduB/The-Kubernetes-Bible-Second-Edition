apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      # Fix: Add securityContext to ensure proper file permissions
      # MSSQL requires specific UID (10001) for proper NFS access
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: "OnRootMismatch"
      initContainers:
      # Fix: Fix-permissions init container to resolve NFS permission issues
      # This ensures the mssql user (UID 10001) can write to NFS mounts
      # Must run with elevated privileges to fix NFS directory permissions
      - name: fix-permissions
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            echo "Fixing NFS directory permissions for MSSQL..."
            if [ -d /var/opt/mssql ]; then
              chmod 777 /var/opt/mssql
              chmod 777 /var/opt/mssql/data 2>/dev/null || true
              chmod 777 /var/opt/mssql/log 2>/dev/null || true
              echo "Permissions fixed: $(ls -ld /var/opt/mssql)"
              echo "Data dir: $(ls -ld /var/opt/mssql/data 2>/dev/null || echo 'not yet created')"
            fi
        volumeMounts:
        - name: mssql-data
          mountPath: /var/opt/mssql
        securityContext:
          # Run init container as root to properly fix NFS permissions
          runAsUser: 0
          allowPrivilegeEscalation: true
      containers:
      - name: db
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: MSSQL_SA_PASSWORD
          value: "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx"
        - name: MSSQL_PID
          value: "Developer"
        ports:
        - containerPort: 1433
        volumeMounts:
        - name: mssql-data
          mountPath: /var/opt/mssql
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 10001
      volumes:
      - name: mssql-data
        persistentVolumeClaim:
          claimName: mssql-nas-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql-nas-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-nas
  resources:
    requests:
      storage: 15Gi