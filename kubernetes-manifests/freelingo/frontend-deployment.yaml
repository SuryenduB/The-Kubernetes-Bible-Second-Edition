apiVersion: apps/v1
kind: Deployment
metadata:
  name: freelingo-frontend
  namespace: freelingo
  labels:
    app: freelingo-frontend
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app: freelingo-frontend
  template:
    metadata:
      labels:
        app: freelingo-frontend
        component: frontend
    spec:
      serviceAccountName: freelingo-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: frontend
          image: ghcr.io/artcc/freelingo-frontend@sha256:9e6b4c3ce5b0a5fbdbb68cb054baafb1f9dae7a3a4f8bf7363e21dc53b0dd051
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://freelingo-backend:8000"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
