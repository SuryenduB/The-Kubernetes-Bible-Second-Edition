apiVersion: v1
kind: Secret
metadata:
  name: freelingo-secrets
  namespace: freelingo
type: Opaque
stringData:
  # Database
  postgres-password: "CHANGE_ME_DB_PASSWORD"
  POSTGRES_DB: "freelingo"
  POSTGRES_USER: "freelingo"

  # Redis
  redis-password: "CHANGE_ME_REDIS_PASSWORD"

  # Auth (generate with: openssl rand -hex 32)
  secret-key: "CHANGE_ME_SECRET_KEY"

  # LLM Provider: NVIDIA NIM (OpenAI-compatible)
  LLM_PROVIDER: "openai"
  OPENAI_API_KEY: "nvapi-CHANGE_ME_NVIDIA_API_KEY"
  OPENAI_MODEL: "meta/llama-3.1-8b-instruct"

  # TTS & STT via OpenAI (no local GPU needed)

  # Stripe (optional - set to true to enable subscription paywall)

  # Email / SMTP (optional)
