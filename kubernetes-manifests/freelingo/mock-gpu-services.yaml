apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-gpu-config
  namespace: freelingo
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;
    events {
        worker_connections 1024;
    }
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        sendfile on;
        keepalive_timeout 65;
        server {
            listen 8880;
            location / {
                return 200 '{"status":"ok","models":["kokoro"]}';
                add_header Content-Type application/json;
            }
        }
        server {
            listen 9000;
            location / {
                return 200 '{"status":"ok"}';
                add_header Content-Type application/json;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-gpu-services
  namespace: freelingo
  labels:
    app: mock-gpu-services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-gpu-services
  template:
    metadata:
      labels:
        app: mock-gpu-services
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8880
              name: kokoro
            - containerPort: 9000
              name: whisper
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "32Mi"
      volumes:
        - name: config
          configMap:
            name: mock-gpu-config
---
apiVersion: v1
kind: Service
metadata:
  name: kokoro
  namespace: freelingo
spec:
  type: ClusterIP
  selector:
    app: mock-gpu-services
  ports:
    - protocol: TCP
      port: 8880
      targetPort: 8880
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: whisper
  namespace: freelingo
spec:
  type: ClusterIP
  selector:
    app: mock-gpu-services
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
      name: http
