apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: freelingo-db
  namespace: freelingo
  labels:
    app: freelingo-db
    component: database
spec:
  serviceName: freelingo-db
  replicas: 1
  selector:
    matchLabels:
      app: freelingo-db
  template:
    metadata:
      labels:
        app: freelingo-db
        component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "freelingo"
            - name: POSTGRES_USER
              value: "freelingo"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freelingo-secrets
                  key: postgres-password
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - freelingo
                - -d
                - freelingo
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - freelingo
                - -d
                - freelingo
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: freelingo-db-data
