apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre-web
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: calibre-web
  template:
    metadata:
      labels:
        app: calibre-web
    spec:
      containers:
      # Container 1: Calibre Web (UI & Web Server)
      - name: calibre-web
        image: ghcr.io/linuxserver/calibre-web:0.6.25-ls358
        ports:
        - containerPort: 8083
        resources:
          requests:
            cpu: 500m
            memory: 256Mi
          limits:
            cpu: "2"
            memory: 1Gi
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Europe/Berlin"
        livenessProbe:
          httpGet:
            path: /
            port: 8083
          initialDelaySeconds: 60
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: config
          mountPath: /config
        - name: library
          mountPath: /library
        - name: config
          mountPath: /library/metadata.db
          subPath: metadata.db

      # Container 2: Calibre Importer Daemon (Background Sync)
      - name: calibre-importer
        image: ghcr.io/linuxserver/calibre:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "=== Calibre Importer Sidecar Started ==="
            echo "Watching /import for new eBooks..."
            while true; do
              for f in /import/*.epub /import/*.pdf /import/*.mobi /import/*.azw3 /import/*.fb2 /import/*.djvu /import/*.cbr /import/*.cbz /import/*.docx /import/*.txt; do
                [ -f "$f" ] || continue
                echo "Importing: $f"
                # Import directly into the shared library path (/library)
                calibredb add --library-path=/library "$f" 2>&1
                if [ $? -eq 0 ]; then
                  echo "SUCCESS: $f imported, deleting source..."
                  rm -f "$f"
                else
                  echo "FAILED: $f (will retry)"
                fi
              done
              sleep 15
            done
        securityContext:
          runAsUser: 0
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 1Gi
        volumeMounts:
        - name: config
          mountPath: /config
        - name: library
          mountPath: /library
        - name: config
          mountPath: /library/metadata.db
          subPath: metadata.db
        - name: import
          mountPath: /import

      # Init Container: Set up directory structures and permissions
      initContainers:
      - name: init-library
        image: alpine:3.21
        command:
        - sh
        - -c
        - |
          mkdir -p /library /config
          if [ ! -f /config/metadata.db ]; then
            if [ -f /library/metadata.db ]; then
              echo "Migrating existing metadata.db from NFS to local Longhorn storage..."
              cp -p /library/metadata.db /config/metadata.db
            else
              echo "metadata.db not found, seeding from GitHub to local storage..."
              apk add --no-cache wget
              wget https://github.com/janeczku/calibre-web/raw/master/library/metadata.db -O /config/metadata.db
            fi
          fi
          # Always ensure the SQLite schema has the isbn and flags columns
          echo "Checking and patching SQLite database schema..."
          apk add --no-cache sqlite
          sqlite3 /config/metadata.db "ALTER TABLE books ADD COLUMN isbn TEXT DEFAULT '';" || true
          sqlite3 /config/metadata.db "ALTER TABLE books ADD COLUMN flags INTEGER DEFAULT 0;" || true
          if [ ! -f /library/metadata.db ]; then
            touch /library/metadata.db
          fi
          chown -R 1000:1000 /config
          chown -R 1000:1000 /library
        volumeMounts:
        - name: config
          mountPath: /config
        - name: library
          mountPath: /library

      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: calibre-web-config
      - name: library
        persistentVolumeClaim:
          claimName: calibre-library-pvc
      - name: import
        persistentVolumeClaim:
          claimName: calibre-import-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: calibre-web
  namespace: media
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "calibre-web"
spec:
  selector:
    app: calibre-web
  ports:
  - protocol: TCP
    port: 8083
    targetPort: 8083

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: calibre-web-pdb
  namespace: media
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: calibre-web

---
# PersistentVolumeClaims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-web-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
# Bound to calibre-library-pv (NFS on Synology NAS). Static binding via
# volumeName + empty storageClassName keeps the claim immutably bound.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-library-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: calibre-library-pv
  resources:
    requests:
      storage: 500Gi
---
# Bound to calibre-import-pv (NFS on Synology NAS). Static binding via
# volumeName + empty storageClassName keeps the claim immutably bound.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-import-pvc
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: calibre-import-pv
  resources:
    requests:
      storage: 500Gi

---
# NFS PersistentVolumes for the Calibre e-book library and import drop-folder.
# Both are hosted on the Synology NAS (192.168.0.128).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: calibre-library-pv
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  nfs:
    server: 192.168.0.128
    path: /share/Public/calibre-library
  mountOptions:
    - nfsvers=3
    - nolock
    - noatime
  claimRef:
    name: calibre-library-pvc
    namespace: media
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: calibre-import-pv
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  nfs:
    server: 192.168.0.128
    path: /share/Public/calibre-import
  mountOptions:
    - nfsvers=3
    - nolock
    - noatime
  claimRef:
    name: calibre-import-pvc
    namespace: media
