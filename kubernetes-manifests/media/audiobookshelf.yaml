apiVersion: v1
kind: Namespace
metadata:
  name: media
  labels:
    app.kubernetes.io/name: media

---
# Config PVC (Longhorn)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-config
  namespace: media
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 2Gi

---
# Audiobooks PV (NAS NFS) - Forced to NFSv3
apiVersion: v1
kind: PersistentVolume
metadata:
  name: audiobookshelf-books-pv
spec:
  capacity:
    storage: 500Gi
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=3
    - nolock
    - noatime
  nfs:
    server: 192.168.0.128
    path: /share/Public/audiobooks

---
# Audiobooks PVC (NAS NFS)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audiobookshelf-books-pvc
  namespace: media
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: ""
  volumeName: audiobookshelf-books-pv
  resources:
    requests:
      storage: 500Gi

---
# AudioBookShelf Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: audiobookshelf
        image: ghcr.io/advplyr/audiobookshelf:2.34.0
        ports:
        - containerPort: 80
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits: { cpu: "1", memory: 1Gi }
        env:
        - name: TZ
          value: "Europe/Berlin"
        - name: ABS_METADATA_PATH
          value: "/audiobooks/metadata"
        livenessProbe:
          httpGet: { path: /healthcheck, port: 80 }
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          httpGet: { path: /healthcheck, port: 80 }
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: config
          mountPath: /config
        - name: books
          mountPath: /audiobooks
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: audiobookshelf-config
      - name: books
        persistentVolumeClaim:
          claimName: audiobookshelf-books-pvc

---
# Service with Tailscale Integration
apiVersion: v1
kind: Service
metadata:
  name: audiobookshelf
  namespace: media
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "audiobookshelf"
spec:
  selector:
    app: audiobookshelf
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: audiobookshelf-pdb
  namespace: media
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: audiobookshelf
