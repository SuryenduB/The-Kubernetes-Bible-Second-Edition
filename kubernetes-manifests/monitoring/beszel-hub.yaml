apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: beszel-hub-sa
  namespace: monitoring
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beszel-hub-data
  namespace: monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beszel-hub
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beszel-hub
  template:
    metadata:
      labels:
        app: beszel-hub
    spec:
      serviceAccountName: beszel-hub-sa
      securityContext:
        fsGroup: 1000
      containers:
      - name: beszel
        image: henrygd/beszel:latest
        env:
        - name: APP_URL
          value: "http://beszel"
        ports:
        - containerPort: 8090
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 60
        readinessProbe:
          httpGet:
            path: /
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: beszel-data
          mountPath: /beszel_data
      volumes:
      - name: beszel-data
        persistentVolumeClaim:
          claimName: beszel-hub-data
---
apiVersion: v1
kind: Service
metadata:
  name: beszel-hub
  namespace: monitoring
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "beszel"
    tailscale.com/tags: "tag:k8s"
spec:
  selector:
    app: beszel-hub
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8090
  type: ClusterIP
