apiVersion: v1
kind: ServiceAccount
metadata:
  name: beszel-agent-sa
  namespace: monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: beszel-agent-key
  namespace: monitoring
stringData:
  KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBHMi993ZMbRWvyg7h38/7HRWl6AfOK8jLXidLhBBX+p"
  TOKEN: "f8c02034-9f5c-42b1-82ad-d5b80dbd5293"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beszel-agent
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: beszel-agent
  template:
    metadata:
      labels:
        app: beszel-agent
    spec:
      serviceAccountName: beszel-agent-sa
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: beszel-agent
        image: henrygd/beszel-agent:latest
        env:
        - name: PORT
          value: "45876"
        - name: KEY
          valueFrom:
            secretKeyRef:
              name: beszel-agent-key
              key: KEY
        - name: TOKEN
          valueFrom:
            secretKeyRef:
              name: beszel-agent-key
              key: TOKEN
        - name: HUB_URL
          value: "http://beszel-hub"
        - name: DOCKER_HOST
          value: "unix:///run/containerd/containerd.sock"
        - name: SYSTEM_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - containerPort: 45876
          hostPort: 45876
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          tcpSocket:
            port: 45876
          initialDelaySeconds: 15
          periodSeconds: 30
        volumeMounts:
        - name: containerd-sock
          mountPath: /run/containerd/containerd.sock
          readOnly: true
      volumes:
      - name: containerd-sock
        hostPath:
          path: /run/k3s/containerd/containerd.sock
          type: Socket
      tolerations:
      - effect: NoSchedule
        operator: Exists
