# 1:1 K3s Port of "iiqstack" - Fully Hardened Production-Ready Version
# Features: RBAC, Resource Quotas, Network Policies, Tailscale, Traefik L7, and Longhorn Storage (HA)

---
# --- 0. Namespace ---
apiVersion: v1
kind: Namespace
metadata:
  name: iiqstack
  labels:
    name: iiqstack

---
# --- 0.1 Namespace Governance (ResourceQuota) ---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: iiqstack-quota
  namespace: iiqstack
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    persistentvolumeclaims: "10"
    pods: "50"

---
# --- 0.2 Namespace Governance (LimitRange) ---
apiVersion: v1
kind: LimitRange
metadata:
  name: iiqstack-limits
  namespace: iiqstack
spec:
  limits:
    - max:
        cpu: "4"
        memory: "8Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "500m"
        memory: "1Gi"
      defaultRequest:
        cpu: "200m"
        memory: "512Mi"
      type: Container

---
# --- 0.3 Network Security (Hardened Policies) ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iiqstack-default-deny
  namespace: iiqstack
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iiqstack-allow-internal
  namespace: iiqstack
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
    # FIX: Allow egress to Kubernetes API Server (required for Job polling)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

---
# --- 0.4 IdentityIQ ServiceAccount & RBAC ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: iiq-sa
  namespace: iiqstack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: iiq-role
  namespace: iiqstack
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: iiq-rolebinding
  namespace: iiqstack
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: iiq-role
subjects:
  - kind: ServiceAccount
    name: iiq-sa
    namespace: iiqstack

---
# --- SailPoint Secrets ---
apiVersion: v1
kind: Secret
metadata:
  name: sailpoint-db-secrets
  namespace: iiqstack
type: Opaque
stringData:
  mssql-sa-password: "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx"
  mssql-user-password: "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx"
  mysql-root-password: "password"
  mysql-user-password: "identityiq"
  ldap-admin-password: "spadmin"
  ssh-password: "password"

---
# --- 1. Counter Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter
  namespace: iiqstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: counter
  template:
    metadata:
      labels:
        app: counter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: counter
          image: drosenbauer/docker-counter
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
          livenessProbe:
            tcpSocket: { port: 12345 }
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: counter
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-counter"
spec:
  selector:
    app: counter
  ports:
    - protocol: TCP
      port: 12345
      targetPort: 12345

---
# --- 2. SSH Host ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh
  namespace: iiqstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh
  template:
    metadata:
      labels:
        app: ssh
    spec:
      containers:
        - name: ssh
          image: drosenbauer/docker-ssh-host
          livenessProbe:
            tcpSocket: { port: 22 }
            initialDelaySeconds: 10
            periodSeconds: 30
          env:
            - name: SSH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sailpoint-db-secrets
                  key: ssh-password
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: ssh
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-ssh"
spec:
  selector:
    app: ssh
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22

---
# --- 3. LDAP & phpLDAPadmin ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ldap
  namespace: iiqstack
spec:
  replicas: 1
  serviceName: ldap
  selector:
    matchLabels:
      app: ldap
  template:
    metadata:
      labels:
        app: ldap
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 0
        fsGroup: 911
      containers:
        - name: ldap
          image: osixia/openldap:1.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 389
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
          livenessProbe:
            tcpSocket: { port: 389 }
            initialDelaySeconds: 60
            periodSeconds: 30
          env:
            - name: LDAP_DOMAIN
              value: sailpoint.demo
            - name: LDAP_ORGANISATION
              value: Sailpoint Demo
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sailpoint-db-secrets
                  key: ldap-admin-password
            - name: LDAP_TLS
              value: "false"
          volumeMounts:
            - name: ldap-persistent-storage
              mountPath: /var/lib/ldap
              subPath: data
            - name: ldap-persistent-storage
              mountPath: /etc/ldap/slapd.d
              subPath: config
  volumeClaimTemplates:
    - metadata:
        name: ldap-persistent-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
        storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: ldap
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-ldap"
spec:
  selector:
    app: ldap
  ports:
    - name: ldap
      protocol: TCP
      port: 389
      targetPort: 389

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpldapadmin
  namespace: iiqstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpldapadmin
  template:
    metadata:
      labels:
        app: phpldapadmin
    spec:
      # securityContext removed to allow osixia/phpldapadmin root initialization
      containers:
        - name: phpldapadmin
          image: osixia/phpldapadmin
          ports:
            - containerPort: 443
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 100m, memory: 128Mi }
          livenessProbe:
            tcpSocket: { port: 443 }
            initialDelaySeconds: 20
            periodSeconds: 30
          env:
            - name: PHPLDAPADMIN_LDAP_HOSTS
              value: ldap
---
apiVersion: v1
kind: Service
metadata:
  name: phpldapadmin
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-ldap-admin"
spec:
  type: ClusterIP
  selector:
    app: phpldapadmin
  ports:
    - protocol: TCP
      port: 443
      targetPort: 443

---
# --- 4. ActiveMQ (StatefulSet for Persistence) ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: activemq
  namespace: iiqstack
spec:
  serviceName: activemq
  replicas: 1
  selector:
    matchLabels:
      app: activemq
  template:
    metadata:
      labels:
        app: activemq
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: activemq
          image: apache/activemq-artemis:2.31.0-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8161
            - containerPort: 61616
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 300m, memory: 512Mi }
          livenessProbe:
            tcpSocket: { port: 8161 }
            initialDelaySeconds: 120
            periodSeconds: 30
          volumeMounts:
            - name: activemq-storage
              mountPath: /var/lib/artemis-instance
  volumeClaimTemplates:
    - metadata:
        name: activemq-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: activemq
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-mq-admin"
spec:
  type: ClusterIP
  selector:
    app: activemq
  ports:
    - name: admin-ui
      protocol: TCP
      port: 8161
      targetPort: 8161
    - name: broker
      protocol: TCP
      port: 61616
      targetPort: 61616
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: activemq-ingress
  namespace: iiqstack
spec:
  entryPoints: ["web"]
  routes:
    - match: PathPrefix(`/activemq`)
      kind: Rule
      services:
        - name: activemq
          port: 8161
          sticky:
            cookie: {}

---
# --- 5. Databases ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: iiqstack
spec:
  replicas: 1
  serviceName: db
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 10001
        fsGroup: 10001
      initContainers:
        - name: nfs-permissions-fix
          image: busybox
          command:
            ["sh", "-c", "echo 'Longhorn block storage, bypassing NFS fixes'"]
          volumeMounts:
            - name: mssql-persistent-storage
              mountPath: /var/opt/mssql
      containers:
        - name: mssql
          image: mcr.microsoft.com/mssql/server:2019-CU28-ubuntu-20.04
          securityContext:
            privileged: false
          resources:
            requests: { cpu: 500m, memory: 2Gi }
            limits: { cpu: "1.5", memory: 4Gi }
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  SQLCMD=$(find /opt/mssql-tools* /opt/mssql/bin -name sqlcmd | head -n 1)
                  [ -z "$SQLCMD" ] && SQLCMD=sqlcmd
                  $SQLCMD -S localhost -U sa -P "$MSSQL_SA_PASSWORD" -No -C -Q 'SELECT 1'
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 1433 }
            initialDelaySeconds: 60
            periodSeconds: 30
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sailpoint-db-secrets
                  key: mssql-sa-password
            - name: MSSQL_PID
              value: Developer
            - name: TZ
              value: "UTC"
          volumeMounts:
            - name: mssql-persistent-storage
              mountPath: /var/opt/mssql
  volumeClaimTemplates:
    - metadata:
        name: mssql-persistent-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-db"
spec:
  selector:
    app: db
  ports:
    - protocol: TCP
      port: 1433
      targetPort: 1433

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-mysql
  namespace: iiqstack
spec:
  replicas: 1
  serviceName: db-mysql
  selector:
    matchLabels:
      app: db-mysql
  template:
    metadata:
      labels:
        app: db-mysql
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - kubernetes2
      enableServiceLinks: false
      # securityContext removed to allow MySQL 8.0 root initialization
      containers:
        - name: mysql
          image: mysql:8.0
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: "1", memory: 2Gi }
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3306 }
            initialDelaySeconds: 60
            periodSeconds: 30
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sailpoint-db-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: identityiq
            - name: MYSQL_USER
              value: identityiq
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sailpoint-db-secrets
                  key: mysql-user-password
            - name: TZ
              value: "UTC"
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: mysql-persistent-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: db-mysql
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-db-mysql"
spec:
  selector:
    app: db-mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306

---
# --- 6. Mailpit ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mail
  namespace: iiqstack
spec:
  replicas: 1
  serviceName: mail
  selector:
    matchLabels:
      app: mail
  template:
    metadata:
      labels:
        app: mail
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: mailpit
          image: axllent/mailpit
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
          livenessProbe:
            tcpSocket: { port: 8025 }
            initialDelaySeconds: 15
            periodSeconds: 30
          env:
            - name: MP_DATABASE
              value: "/data/mailpit.db"
            - name: MP_SMTP_AUTH_ACCEPT_ANY
              value: "1"
            - name: MP_SMTP_AUTH_ALLOW_INSECURE
              value: "1"
          volumeMounts:
            - name: mail-persistent-storage
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: mail-persistent-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
        storageClassName: longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: mail
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-mail"
spec:
  type: ClusterIP
  selector:
    app: mail
  ports:
    - name: smtp
      protocol: TCP
      port: 1025
      targetPort: 1025
    - name: http
      protocol: TCP
      port: 8025
      targetPort: 8025

---
# --- 7. IdentityIQ Init Job ---
apiVersion: batch/v1
kind: Job
metadata:
  name: iiq-init
  namespace: iiqstack
spec:
  template:
    metadata:
      labels:
        app: iiq-init
    spec:
      serviceAccountName: iiq-sa
      initContainers:
        - name: wait-for-all-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db 1433; do echo waiting for mssql; sleep 5; done;
              until nc -z db-mysql 3306; do echo waiting for mysql; sleep 5; done;
              until nc -z ldap 389; do echo waiting for ldap; sleep 5; done;
              until nc -z mail 1025; do echo waiting for mail; sleep 5; done;
              until nc -z activemq 61616; do echo waiting for activemq; sleep 5; done;
              echo "All dependencies are up."
      containers:
        - name: iiq-init
          image: 192.168.0.236:5000/sailpoint-iiq:8.5
          command: ["/bin/bash", "-c"]
          args:
            - |
              # 1. Unpack
              cd /opt/tomcat/webapps
              unzip -qo /opt/iiq/identityiq.war -d identityiq
              cd identityiq/WEB-INF/classes

              # 2. Configure for schema init
              sed -ri "s/^(dataSource\.url=).*/\1jdbc:sqlserver:\/\/db:1433;databaseName=identityiq;encrypt=true;trustServerCertificate=true/" iiq.properties
              sed -ri "s/^(dataSource\.driverClassName=).*/\1com.microsoft.sqlserver.jdbc.SQLServerDriver/" iiq.properties
              sed -ri "s/^(dataSource\.username=).*/\1identityiq/" iiq.properties
              sed -ri "s/^(dataSource\.password=).*/\1id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx/" iiq.properties

              # 3. Create schema if missing
              echo "Verifying schema..."
              /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx" -No -C -Q "IF DB_ID('identityiq') IS NULL CREATE DATABASE identityiq"

              # Check if tables exist
              RESULT=$(/opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx" -No -C -d identityiq -Q "IF OBJECT_ID('spt_database_version', 'U') IS NOT NULL SELECT '1' ELSE SELECT '0'" -h -1 | tr -d '[:space:]')
              if [ "$RESULT" = "0" ]; then
                echo "Schema missing, creating..."
                /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx" -No -C -i /opt/tomcat/webapps/identityiq/WEB-INF/database/create_identityiq_tables-8.4.sqlserver
              else
                echo "Schema already exists."
              fi

              echo "Initialization complete, exiting!"
          env:
            - name: DATABASE_TYPE
              value: mssql
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sailpoint-db-secrets
                  key: mssql-sa-password
      restartPolicy: OnFailure

---
# --- 8. IdentityIQ App Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iiq
  namespace: iiqstack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      app: iiq
  template:
    metadata:
      labels:
        app: iiq
    spec:
      enableServiceLinks: false
      serviceAccountName: iiq-sa
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-and-prep-nas
          image: 192.168.0.236:5000/sailpoint-iiq:8.5
          securityContext:
            runAsUser: 0
            privileged: true
          command:
            - /bin/bash
            - -c
            - |
              # 1. Wait for Job
              echo "Waiting for iiq-init Job..."
              until [ "$(curl -s https://kubernetes.default/apis/batch/v1/namespaces/iiqstack/jobs/iiq-init --header "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" --insecure | grep -oP '"succeeded":\s*\K\d+')" == "1" ]; do
                echo "Still waiting for schema initialization..."
                sleep 10
              done

              # 2. Configuration Hashing (State Detection)
              # We hash all critical connection strings to detect if the config changed
              CONFIG_STATE="db:1433:identityiq:identityiqPlugin:identityiqah"
              CONFIG_HASH=$(echo "$CONFIG_STATE" | md5sum | cut -d' ' -f1)
              SENTINEL=".unpacked_${CONFIG_HASH}"

              cd /opt/tomcat/webapps
              WAR_FILE=/opt/iiq/identityiq.war

              # 3. Smart Unpack/Patch Decision
              NEEDS_WORK=0
              if [ ! -f "$SENTINEL" ]; then
                echo "No valid config sentinel found ($SENTINEL). Starting preparation..."
                NEEDS_WORK=1
              elif [ "$WAR_FILE" -nt "$SENTINEL" ]; then
                echo "Newer WAR file detected. Triggering upgrade..."
                NEEDS_WORK=1
              fi

              if [ "$NEEDS_WORK" -eq 1 ]; then
                if mkdir .lock 2>/dev/null; then
                  # Clean old sentinels to prevent disk clutter
                  rm -f .unpacked_*
                  
                  # Only unzip if the directory is missing or we detect a WAR change
                  if [ ! -d identityiq ] || [ "$WAR_FILE" -nt "identityiq" ]; then
                    echo "Unpacking IdentityIQ WAR..."
                    rm -rf identityiq
                    mkdir -p identityiq
                    unzip -qo $WAR_FILE -d identityiq
                  fi
                  
                  # 4. Inject Configuration (Atomic Multi-Key Patch)
                  PROPS=/opt/tomcat/webapps/identityiq/WEB-INF/classes/iiq.properties
                  echo "Applying Configuration Patch (Hash: $CONFIG_HASH)..."
                  
                  sed -ri "s/^(dataSource\.url=).*/\1jdbc:sqlserver:\/\/db:1433;databaseName=identityiq;encrypt=true;trustServerCertificate=true/" ${PROPS}
                  sed -ri "s/^(dataSource\.driverClassName=).*/\1com.microsoft.sqlserver.jdbc.SQLServerDriver/" ${PROPS}
                  sed -ri "s/^(dataSource\.username=).*/\1identityiq/" ${PROPS}
                  sed -ri "s/^(dataSource\.password=).*/\1id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx/" ${PROPS}
                  sed -ri "s/^(sessionFactory\.hibernateProperties\.hibernate\.dialect=).*/\1sailpoint.persistence.SQLServerPagingDialect/" ${PROPS}
                  
                  sed -ri "s/^(pluginsDataSource\.url=).*/\1jdbc:sqlserver:\/\/db:1433;databaseName=identityiqPlugin;encrypt=true;trustServerCertificate=true/" ${PROPS}
                  sed -ri "s/^(pluginsDataSource\.driverClassName=).*/\1com.microsoft.sqlserver.jdbc.SQLServerDriver/" ${PROPS}
                  sed -ri "s/^(pluginsDataSource\.password=).*/\1id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx/" ${PROPS}
                  
                  sed -ri "s/^(dataSourceAccessHistory\.url=).*/\1jdbc:sqlserver:\/\/db:1433;databaseName=identityiqah;encrypt=true;trustServerCertificate=true/" ${PROPS}
                  sed -ri "s/^(dataSourceAccessHistory\.driverClassName=).*/\1com.microsoft.sqlserver.jdbc.SQLServerDriver/" ${PROPS}
                  sed -ri "s/^(dataSourceAccessHistory\.password=).*/\1id3ntityIQ!-TQ8BaiOxKAL4v-4lCIxVx/" ${PROPS}
                  sed -ri "s/^(sessionFactoryAccessHistory\.hibernateProperties\.hibernate\.dialect=).*/\1sailpoint.persistence.SQLServerUnicodeDialect/" ${PROPS}

                  echo "scheduler.quartzProperties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.MSSQLDelegate" >> ${PROPS}
                  echo "scheduler.quartzProperties.org.quartz.jobStore.selectWithLockSQL=SELECT * FROM {0}LOCKS UPDLOCK WHERE LOCK_NAME = ?" >> ${PROPS}
                  
                  # 5. Driver Workaround
                  echo "Injecting driver into system lib..."
                  cp -f /opt/iiq/lib/mssql-jdbc*.jar /opt/tomcat/lib/
                  cp -f /opt/iiq/lib/*.jar /opt/tomcat/webapps/identityiq/WEB-INF/lib/

                  touch "$SENTINEL"
                  rmdir .lock
                  echo "Configuration Patching Complete."
                else
                  echo "Preparation already in progress by another pod, waiting..."
                  until [ -f "$SENTINEL" ] && [ ! -d .lock ]; do sleep 5; done
                fi
              fi

              # 5. Final Permissions
              chown -R 1000:1000 /opt/tomcat/webapps
              echo "Storage Preparation Complete."
          volumeMounts:
            - name: iiq-nas-data
              mountPath: /opt/tomcat/webapps
      containers:
        - name: iiq
          image: 192.168.0.236:5000/sailpoint-iiq:8.5
          securityContext:
            runAsUser: 1000
          command: ["/opt/tomcat/bin/catalina.sh", "run"]
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 500m, memory: 2Gi }
            limits: { cpu: "2", memory: 4Gi }
          startupProbe:
            httpGet: { path: /identityiq, port: 8080 }
            failureThreshold: 60
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /identityiq, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /identityiq, port: 8080 }
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: iiq-nas-data
              mountPath: /opt/tomcat/webapps
      volumes:
        - name: iiq-nas-data
          persistentVolumeClaim:
            claimName: iiq-nas-pvc

---
# Longhorn PVC for App Storage (RWX for multi-node support)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: iiq-nas-pvc
  namespace: iiqstack
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn

---
# IdentityIQ Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: iiq-pdb
  namespace: iiqstack
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: iiq

---
# Database & Middleware Pod Disruption Budgets (Production Hardening)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: db-pdb
  namespace: iiqstack
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: db
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: db-mysql-pdb
  namespace: iiqstack
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: db-mysql
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ldap-pdb
  namespace: iiqstack
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: ldap
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: activemq-pdb
  namespace: iiqstack
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: activemq
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mail-pdb
  namespace: iiqstack
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: mail

---
# IdentityIQ L7 & Tailscale Services
apiVersion: v1
kind: Service
metadata:
  name: iiq
  namespace: iiqstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/proxy-class: "tailscale-proxy"
    tailscale.com/hostname: "iiq-main"
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  selector:
    app: iiq
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: iiq-ingress
  namespace: iiqstack
spec:
  entryPoints: ["web"]
  routes:
    - match: PathPrefix(`/identityiq`)
      kind: Rule
      services:
        - name: iiq
          port: 80
          sticky:
            cookie: {}
